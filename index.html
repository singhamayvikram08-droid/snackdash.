<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnackDash | Premium Snacks & Noodles</title>
  <meta name="description"
    content="Premium destination for Maggi, Yippee, Pasta, and Snacks. Instant cravings satisfied.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Inter:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>

<body>
  <div class="bg-blobs">
    <div class="blob blob-3"></div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <div id="maintenanceOverlay" class="maintenance-overlay hidden">
    <div class="maintenance-content">
      <h2>We're making things better!</h2>
      <p>SnackDash is currently undergoing scheduled maintenance. Please check back soon.</p>
    </div>
  </div>

  <header id="header">
    <div class="container nav" style="justify-content: center;">
      <div class="logo">
        <a href="index.html" style="color: inherit; text-decoration: none;">SnackDash</a>
      </div>
    </div>
  </header>

  <main style="display: flex; align-items: center; justify-content: center; min-height: 80vh; padding: 2rem;">
    <div class="glass-card animate"
      style="width: 100%; max-width: 440px; padding: 2.5rem; text-align: center; position: relative; z-index: 10;">
      <h2 style="font-size: 2rem; font-weight: 900; margin-bottom: 0.5rem;" id="authTitle">Welcome to SnackDash</h2>
      <p style="color: var(--text-dim); margin-bottom: 2rem;" id="authSubtitle">Choose your portal to continue.</p>

      <!-- Role Selector: 3 Tabs -->
      <div id="roleSelector"
        style="display: flex; gap: 0.5rem; margin-bottom: 2rem; background: rgba(0,0,0,0.2); padding: 0.5rem; border-radius: 1rem;">
        <button type="button" class="btn role-tab active-role" data-role="customer"
          style="flex: 1; padding: 0.5rem; font-size: 0.85rem;">🛒 Customer</button>
        <button type="button" class="btn role-tab" data-role="admin"
          style="flex: 1; padding: 0.5rem; font-size: 0.85rem;">🔧 Admin</button>
        <button type="button" class="btn role-tab" data-role="scanner"
          style="flex: 1; padding: 0.5rem; font-size: 0.85rem;">📦 Scanner</button>
      </div>

      <!-- Customer: Login / Sign Up Toggle -->
      <div id="customerAuthToggle"
        style="display: flex; gap: 1rem; margin-bottom: 1.5rem; background: rgba(0,0,0,0.15); padding: 0.4rem; border-radius: 0.8rem;">
        <button id="toggleLoginBtn" class="btn"
          style="flex: 1; padding: 0.4rem; background: var(--primary); color: white; font-size: 0.85rem;">Log
          In</button>
        <button id="toggleSignupBtn" class="btn"
          style="flex: 1; padding: 0.4rem; background: transparent; color: var(--text-dim); font-size: 0.85rem;">Sign
          Up</button>
      </div>

      <form id="authForm" style="text-align: left;">
        <!-- Name field (only for Customer Sign Up) -->
        <div class="form-group" id="nameGroup" style="display: none;">
          <label for="authName">Full Name</label>
          <input type="text" id="authName" placeholder="Enter your name">
        </div>
        <div class="form-group">
          <label for="authEmail">Email Address</label>
          <input type="email" id="authEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="authPassword">Password</label>
          <div style="position: relative;">
            <input type="password" id="authPassword" placeholder="••••••••" required minlength="6"
              style="width: 100%; box-sizing: border-box; padding-right: 40px;">
            <button type="button"
              onclick="const p=document.getElementById('authPassword'); const ic=document.getElementById('custEyeIcon'); if(p.type==='password'){p.type='text'; ic.innerHTML=`<path d='M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z'/><circle cx='12' cy='12' r='3'/>`;}else{p.type='password'; ic.innerHTML=`<path d='M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68m-2.94 2.94A10.4 10.4 0 0 1 12 19c-7 0-10-7-10-7a13.16 13.16 0 0 1 1.67-2.68m2.94-2.94a4 4 0 1 0 5.66 5.66M1 1l22 22'/>`; }"
              style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-dim); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0;">
              <svg id="custEyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68m-2.94 2.94A10.4 10.4 0 0 1 12 19c-7 0-10-7-10-7a13.16 13.16 0 0 1 1.67-2.68m2.94-2.94a4 4 0 1 0 5.66 5.66M1 1l22 22" />
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="authSubmitBtn">Log
          In</button>
      </form>

      <div style="margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-dim);">
      </div>
    </div>
  </main>

  <footer style="padding: 6rem 0; text-align: center; border-top: 1px solid var(--glass-border);">
    <div class="logo" style="margin-bottom: 1.5rem;">SnackDash</div>
    <p style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 1rem;">&copy; 2026 SnackDash. Crafted for
      ultimate cravings.</p>
  </footer>

  <script type="module" src="/src/main.ts"></script>
  <!-- Live Chat Widget FAB -->
  <button id="chatFab" class="chat-fab hidden" aria-label="Open Live Chat">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    </svg>
    <div class="unread-dot"></div>
  </button>

  <div id="chatWidget" class="chat-widget hidden">
    <div class="chat-header">
      <h3 style="margin: 0; font-size: 1rem;">Live Support</h3>
      <button id="closeChatBtn"
        style="background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem;">&times;</button>
    </div>
    <div id="chatMessages" class="chat-messages">
      <div class="chat-msg system">Connecting to live agent...</div>
    </div>
    <form id="chatForm" class="chat-input-area">
      <input type="text" id="chatInput" placeholder="Type a message..." required autocomplete="off">
      <button type="submit" class="btn btn-primary" style="padding: 0.5rem 1rem;">Send</button>
    </form>
  </div>
</body>

</html>
