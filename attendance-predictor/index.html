<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance Predictor | Reach 75%</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="dashboard scale-in">
        <!-- Input Section -->
        <div class="card input-section">
            <h2>Track Attendance</h2>
            <div class="form-group">
                <label for="conducted">Total Classes Conducted</label>
                <input type="number" id="conducted" placeholder="0" min="0">
            </div>
            <div class="form-group">
                <label for="attended">Classes Attended</label>
                <input type="number" id="attended" placeholder="0" min="0">
            </div>
            <p style="color: var(--text-dim); font-size: 0.8rem; margin-top: 2rem;">
                * 75% attendance is standard for most universities.
            </p>
        </div>

        <!-- Results Section -->
        <div class="results-section">
            <div class="card main-stat">
                <div class="attendance-circle" id="circle">
                    <span id="percentageValue">0%</span>
                    <span style="font-size: 0.8rem; color: var(--text-dim);">Current</span>
                </div>
                <div id="statusBadge" class="status-badge status-danger">BELOW 75%</div>
                <p id="statusHeading"
                    style="margin-top: 1.5rem; font-weight: 600; font-size: 1.1rem; color: var(--text-main);">
                    Welcome to Predictor
                </p>
            </div>

            <div class="stats-grid">
                <div class="card stat-card">
                    <p class="stat-label">Classes Needed</p>
                    <p class="stat-value" id="neededValue">0</p>
                    <p style="font-size: 0.7rem; color: var(--text-dim); margin-top: 0.5rem;">To reach 75%</p>
                </div>
                <div class="card stat-card">
                    <p class="stat-label">Safe Bunks</p>
                    <p class="stat-value" id="bunkValue">0</p>
                    <p style="font-size: 0.7rem; color: var(--text-dim); margin-top: 0.5rem;">To stay above 75%</p>
                </div>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>

</html>
