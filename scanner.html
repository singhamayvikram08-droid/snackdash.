<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>snackdash.order | Scanner Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>
    <!-- Session Guard: redirect to login if not authenticated -->
    <script>
        if (localStorage.getItem('snackdash_scanner_session') !== 'true') {
            window.location.href = 'index.html';
        }
    </script>

    <!-- Global Maintenance Overlay -->
    <div id="maintenanceOverlay" class="maintenance-overlay hidden">
        <div class="maintenance-content">
            <h2>We're making things better!</h2>
            <p>SnackDash is currently undergoing scheduled maintenance. Please check back soon.</p>
        </div>
    </div>

    <header id="header">
        <div class="container nav">
            <div class="logo">snackdash.order</div>
            <div class="nav-links" style="display: flex; gap: 1rem;">
                <button id="addProductBtn" class="btn btn-primary"
                    style="background: #00ff77; color: #0a0a0a; font-weight: 700;">+ Add Product</button>
                <button id="manageStockBtn" class="btn btn-primary"
                    style="background: var(--primary); color: white;">Manage Stock</button>
                <button id="scannerLogoutBtn" class="btn btn-outline"
                    style="background: #ff4d4f; color: white; border-color: #ff4d4f;">Logout</button>
            </div>
        </div>
    </header>

    <main style="padding: 10rem 0 6rem; min-height: 80vh; display: flex; align-items: center;">
        <div class="container" style="width: 100%;">

            <!-- Main Scanner Interface (shown directly, login happens at index.html) -->
            <div id="scannerApp" style="max-width: 800px; margin: 0 auto; width: 100%;">

                <!-- Search Section -->
                <div class="admin-container" style="text-align: center; margin-bottom: 2rem;">
                    <h2 style="font-size: 2.5rem; font-weight: 900; margin-bottom: 1rem;">Order Lookup</h2>
                    <form id="scannerSearchForm" onsubmit="event.preventDefault();"
                        style="display: flex; gap: 1rem; align-items: center; max-width: 600px; margin: 0 auto;">
                        <input type="text" id="orderIdSearch" class="input-field"
                            placeholder="Scan or Type (e.g. #123XYZ or 123XYZ)" required
                            style="flex: 1; font-size: 1.25rem; font-family: monospace; text-transform: uppercase;">
                        <button type="submit" class="btn btn-primary"
                            style="padding: 1rem 2rem; font-size: 1.2rem;">Fetch</button>
                    </form>
                </div>

                <!-- Result Section -->
                <div id="scannerResult" class="hidden">
                    <!-- Injected via main.ts -->
                </div>

            </div>

        </div>
    </main>

    <!-- Live Chat Widget (Scanner receives customer chat) -->
    <button id="chatFab" class="chat-fab" aria-label="Open Live Chat">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        <div class="unread-dot"></div>
    </button>

    <div id="chatWidget" class="chat-widget hidden">
        <div class="chat-header">
            <h3 id="chatTitle" style="margin: 0; font-size: 1rem;">Live Chat</h3>
            <button id="closeChatBtn"
                style="background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem;">&times;</button>
        </div>
        <div id="chatMessages" class="chat-messages">
            <div class="chat-msg system">Select an order to start chatting...</div>
        </div>
        <form id="chatForm" class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Type a message to customer..." required autocomplete="off">
            <button type="submit" class="btn btn-primary" style="padding: 0.5rem 1rem;">Send</button>
        </form>
    </div>

    <!-- Scanner Inventory Modal -->
    <div id="scannerInventoryModal" class="hidden"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 1000; overflow-y: auto; padding: 2rem;">
        <div class="container"
            style="max-width: 800px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 2rem; border-radius: 2rem; border: 1px solid rgba(255,255,255,0.1);">
            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem;">
                <h2 style="font-size: 2rem; font-weight: 900; margin: 0;">Stock Management</h2>
                <button id="closeStockModalBtn" class="btn btn-outline"
                    style="padding: 0.5rem 1rem; color: #ff4d4f; border-color: rgba(255,77,79,0.3);">Close</button>
            </div>

            <div id="scannerInventoryList" style="display: grid; gap: 1rem;">
                <p style="text-align: center; color: var(--text-dim);">Loading inventory...</p>
            </div>
        </div>
    </div>
    <!-- Add Product Modal -->
    <div id="addProductModal" class="hidden"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 1000; overflow-y: auto; padding: 2rem;">
        <div class="container"
            style="max-width: 600px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 2rem; border-radius: 2rem; border: 1px solid rgba(255,255,255,0.1);">
            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem;">
                <h2 style="font-size: 2rem; font-weight: 900; margin: 0;">Add New Product</h2>
                <button id="closeAddProductBtn" class="btn btn-outline"
                    style="padding: 0.5rem 1rem; color: #ff4d4f; border-color: rgba(255,77,79,0.3);">Close</button>
            </div>

            <form id="addProductForm" style="display: grid; gap: 1.5rem;">
                <div>
                    <label
                        style="display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-weight: 600;">Product
                        Name</label>
                    <input type="text" id="productName" class="input-field" placeholder="e.g. Cheese Puffs" required
                        style="width: 100%; font-size: 1.1rem;">
                </div>
                <div>
                    <label
                        style="display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-weight: 600;">Category</label>
                    <select id="productType" class="input-field" required
                        style="width: 100%; font-size: 1.1rem; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.15); padding: 0.8rem; border-radius: 1rem;">
                        <option value="Noodles">Noodles</option>
                        <option value="Pasta">Pasta</option>
                        <option value="Snacks">Snacks</option>
                        <option value="Drinks">Drinks</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div>
                    <label
                        style="display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-weight: 600;">Price
                        (₹)</label>
                    <input type="number" id="productPrice" class="input-field" placeholder="25" required min="1"
                        style="width: 100%; font-size: 1.1rem;">
                </div>
                <div>
                    <label
                        style="display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-weight: 600;">Product
                        Photo</label>
                    <div id="photoPreviewArea"
                        style="border: 2px dashed rgba(255,255,255,0.2); border-radius: 1rem; padding: 2rem; text-align: center; cursor: pointer; transition: border-color 0.3s;"
                        onclick="document.getElementById('productPhoto').click()">
                        <input type="file" id="productPhoto" accept="image/*" style="display: none;">
                        <p id="photoPlaceholder" style="color: var(--text-dim); margin: 0;">📸 Click to upload photo</p>
                        <img id="photoPreview"
                            style="max-width: 100%; max-height: 200px; border-radius: 0.5rem; display: none;">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary"
                    style="width: 100%; padding: 1rem; font-size: 1.2rem; font-weight: 700; background: #00ff77; color: #0a0a0a;">
                    Add Product
                </button>
                <div id="addProductMsg" style="text-align: center; display: none;"></div>
            </form>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>

</html>
